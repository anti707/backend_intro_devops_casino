name: Deploy Service

on:
  push:
    branches:
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Configurar credenciales temporales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Autenticar con Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Preparar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Compilar y subir imagen a AWS ECR 
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          SHA_TAG=${{ github.sha }}
          VERSION_TAG="v1.0.0"
          
          SERVICE_NAME="casino-backend"
          DOCKER_CONTEXT="."


          echo "Construyendo el componente: $SERVICE_NAME"

          docker build -t "$REGISTRY/$SERVICE_NAME:latest" $DOCKER_CONTEXT

          docker tag "$REGISTRY/$SERVICE_NAME:latest" "$REGISTRY/$SERVICE_NAME:$SHA_TAG"
          docker tag "$REGISTRY/$SERVICE_NAME:latest" "$REGISTRY/$SERVICE_NAME:$VERSION_TAG"
          
          docker push "$REGISTRY/$SERVICE_NAME:latest"
          docker push "$REGISTRY/$SERVICE_NAME:$SHA_TAG"
          docker push "$REGISTRY/$SERVICE_NAME:$VERSION_TAG"

      - name: Conectar al clúster de AWS EKS y Desplegar Manifiestos
        run: |
          aws eks update-kubeconfig --region us-east-1 --name casino-vidal-evaluacion3
          
          kubectl apply -f k8s/